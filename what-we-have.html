<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们有什么 | shaooopu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oppo+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Oppo Sans', sans-serif;
            overflow: hidden;
        }
        
        /* 按钮样式 */
        .btn-container {
            position: relative;
            margin-bottom: 40px;
            display: inline-block;
        }
        
        .btn-container a {
            position: relative;
            z-index: 100;
            display: inline-block;
            padding: 25px 80px;
            background-color: #1d3557;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 500;
            transition: all 0.3s ease;
            min-width: 250px;
            font-size: 1.5rem;
            overflow: hidden;
        }
        
        /* 背景颜色展开效果 */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            background-color: #457b9d;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease, left 0.1s ease, top 0.1s ease;
            z-index: 90;
        }
        

    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">shaooopu</a>
            <ul class="nav-links">
                <li><a href="what-we-have.html">我们有什么</a></li>
                <li><a href="about.html">了解我</a></li>
                <li><a href="pay.html">///手头有点紧///</a></li>
            </ul>
        </div>
    </nav>

    <!-- 过场动画 -->
    <div class="transition-overlay" id="transition-overlay"></div>
    
    <!-- 网格容器 -->
    <div class="grid-container" id="grid-container"></div>
    
    <!-- 内容区域 -->
    <div class="container" style="padding-top: 100px; min-height: 80vh; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; z-index: 80;">
        <div style="text-align: center; width: 100%;">
            <div class="btn-container">
                <div class="bg-overlay"></div>
                <a href="server.html">服务器</a>
            </div>
            <div class="btn-container">
                <div class="bg-overlay"></div>
                <a href="art.html">画</a>
            </div>
        </div>
    </div>
    
    <script>
        // 过场动画
        function setupTransitionAnimation() {
            const overlay = document.getElementById('transition-overlay');
            
            // 为所有链接添加过场动画
            const links = document.querySelectorAll('a');
            links.forEach(link => {
                link.addEventListener('click', (e) => {
                    // 只对站内链接添加动画
                    if (link.href.startsWith(window.location.origin)) {
                        e.preventDefault();
                        const targetUrl = link.href;
                        
                        // 显示过场动画
                        overlay.classList.add('active');
                        
                        // 延迟后跳转到目标页面
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 1000);
                    }
                });
            });
        }
        
        // 生成网格
        function generateGrid() {
            const gridContainer = document.getElementById('grid-container');
            if (!gridContainer) return;
            
            // 清空现有网格
            gridContainer.innerHTML = '';
            
            // 计算网格数量
            const width = window.innerWidth;
            const height = window.innerHeight;
            const gridSize = 50;
            const columns = Math.ceil(width / gridSize);
            const rows = Math.ceil(height / gridSize);
            
            // 生成网格项
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < columns; j++) {
                    const gridItem = document.createElement('div');
                    gridItem.classList.add('grid-item');
                    gridContainer.appendChild(gridItem);
                }
            }
        }
        
        // 初始化
        function init() {
            setupTransitionAnimation();
            generateGrid();
        }
        
        // 初始化
        init();
        
        // 窗口大小改变时重新生成网格
        window.addEventListener('resize', generateGrid);
        
        // 按钮交互效果
        document.addEventListener('DOMContentLoaded', function() {
            const btnContainers = document.querySelectorAll('.btn-container');
            
            btnContainers.forEach(container => {
                const button = container.querySelector('a');
                const overlay = container.querySelector('.bg-overlay');
                
                // 鼠标进入按钮
                button.addEventListener('mouseenter', function() {
                    // 计算按钮的中心位置
                    const rect = button.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    
                    // 设置覆盖层的位置为按钮中心
                    overlay.style.left = centerX + 'px';
                    overlay.style.top = centerY + 'px';
                    overlay.style.transform = 'translate(-50%, -50%)';
                    
                    // 展开覆盖层
                    overlay.style.width = '200vw';
                    overlay.style.height = '200vh';
                });
                
                // 鼠标离开按钮
                button.addEventListener('mouseleave', function() {
                    // 收缩覆盖层
                    overlay.style.width = '0';
                    overlay.style.height = '0';
                });
            });
        });
        
        // 鼠标跟随飘动效果
        document.addEventListener('mousemove', (e) => {
            const buttons = document.querySelectorAll('.btn-container a');
            
            const mouseX = e.clientX / window.innerWidth - 0.5;
            const mouseY = e.clientY / window.innerHeight - 0.5;
            
            // 按钮飘动效果
            buttons.forEach(button => {
                const offsetX = mouseX * 20;
                const offsetY = mouseY * 20;
                button.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
                button.style.transition = 'transform 0.3s ease-out';
            });
        });
    </script>

</body>
</html>
