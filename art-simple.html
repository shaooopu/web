<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画 | shaooopu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1d3557;
        }
        
        .navbar {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .logo {
            color: white;
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
        }
        
        .nav-links {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 20px;
        }
        
        .nav-links li a {
            color: white;
            text-decoration: none;
        }
        
        .content {
            padding-top: 100px;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            position: relative;
            z-index: 1;
            padding: 100px 20px 40px;
        }
        
        .art-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .art-header h1 {
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 10px;
        }
        
        .art-header p {
            color: #cccccc;
            font-size: 16px;
        }
        
        .artwork-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }
        
        .artwork-card {
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            z-index: 10;
        }
        
        .artwork-card:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 20px 40px rgba(76, 175, 80, 0.3);
        }
        
        .image-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            position: relative;
        }
        
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }
        
        .image-container:hover img {
            transform: scale(1.1);
        }
        
        .artwork-info {
            padding: 20px;
        }
        
        .artwork-info h3 {
            color: #ffffff;
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: capitalize;
        }
        
        .artwork-info p {
            color: #cccccc;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .close-button {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 30px;
            cursor: pointer;
            z-index: 10001;
        }
        
        .modal-image {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        .modal-title {
            color: #ffffff;
            margin-top: 20px;
            font-size: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">shaooopu</a>
            <ul class="nav-links">
                <li><a href="what-we-have.html">我们有什么</a></li>
                <li><a href="about.html">了解我</a></li>
                <li><a href="pay.html">///手头有点紧///</a></li>
            </ul>
        </div>
    </nav>
    
    <!-- 内容区域 -->
    <div class="content">
        <!-- 标题区域 -->
        <div class="art-header">
            <h1>我的画作</h1>
            <p>这里是一些创意作品</p>
        </div>
        
        <!-- 画作展示区域 -->
        <div class="artwork-grid">
            <!-- 测试画作卡片 -->
            <div class="artwork-card" onclick="openModal('artworks/1.png', '测试画作')">
                <div class="image-container">
                    <img src="artworks/1.png" alt="测试画作">
                </div>
                <div class="artwork-info">
                    <h3>测试画作</h3>
                    <p>1.png</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 图片查看模态框 -->
    <div id="image-modal" class="image-modal">
        <div class="modal-content">
            <button class="close-button" onclick="closeModal()">×</button>
            <img class="modal-image" id="modal-image" src="" alt="">
            <h3 class="modal-title" id="modal-title"></h3>
        </div>
    </div>
    
    <script>
        // 打开模态框
        function openModal(imageSrc, title) {
            const modal = document.getElementById('image-modal');
            const modalImage = document.getElementById('modal-image');
            const modalTitle = document.getElementById('modal-title');
            
            if (!modal || !modalImage || !modalTitle) {
                console.error('模态框元素未找到');
                return;
            }
            
            modalImage.src = imageSrc;
            modalImage.alt = title;
            modalTitle.textContent = title;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        
        // 关闭模态框
        function closeModal() {
            const modal = document.getElementById('image-modal');
            if (!modal) {
                console.error('模态框元素未找到');
                return;
            }
            modal.style.display = 'none';
            document.body.style.overflow = '';
        }
        
        // 初始化
        function init() {
            // 绑定ESC键关闭
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });
            
            // 点击模态框背景关闭
            const modal = document.getElementById('image-modal');
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeModal();
                }
            });
        }
        
        // 初始化
        init();
    </script>

</body>
</html>
