<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试 | shaooopu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #1d3557;
            color: white;
        }
        
        .test-card {
            width: 200px;
            height: 200px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .test-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            max-width: 80%;
            max-height: 80%;
        }
        
        .modal-content img {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>
    <h1>测试页面</h1>
    <p>点击下方卡片测试模态框功能：</p>
    
    <div class="test-card" onclick="openModal()">
        点击我
    </div>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <img src="artworks/1.png" alt="测试图片">
        </div>
    </div>
    
    <script>
        function openModal() {
            console.log('打开模态框');
            const modal = document.getElementById('modal');
            modal.style.display = 'flex';
        }
        
        // 点击模态框关闭
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.style.display = 'none';
            }
        });
    </script>
</body>
</html>
