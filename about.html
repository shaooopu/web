<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>了解我 | shaooopu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oppo+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Oppo Sans', sans-serif;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">shaooopu</a>
            <ul class="nav-links">
                <li><a href="what-we-have.html">我们有什么</a></li>
                <li><a href="about.html">了解我</a></li>
                <li><a href="pay.html">///手头有点紧///</a></li>
            </ul>
        </div>
    </nav>

    <!-- 过场动画 -->
    <div class="transition-overlay" id="transition-overlay"></div>
    
    <!-- 网格容器 -->
    <div class="grid-container" id="grid-container"></div>
    
    <!-- 内容区域 -->
    <div class="container" style="padding-top: 100px; min-height: 80vh; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; z-index: 1;">
        <div style="text-align: center; width: 100%; max-width: 800px; padding: 20px;">
        </div>
    </div>
    
    <script>
        // 过场动画
        function setupTransitionAnimation() {
            const overlay = document.getElementById('transition-overlay');
            
            // 为所有链接添加过场动画
            const links = document.querySelectorAll('a');
            links.forEach(link => {
                link.addEventListener('click', (e) => {
                    // 只对站内链接添加动画
                    if (link.href.startsWith(window.location.origin)) {
                        e.preventDefault();
                        const targetUrl = link.href;
                        
                        // 显示过场动画
                        overlay.classList.add('active');
                        
                        // 延迟后跳转到目标页面
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 1000);
                    }
                });
            });
        }
        
        // 生成网格
        function generateGrid() {
            const gridContainer = document.getElementById('grid-container');
            if (!gridContainer) return;
            
            // 清空现有网格
            gridContainer.innerHTML = '';
            
            // 计算网格数量
            const width = window.innerWidth;
            const height = window.innerHeight;
            const gridSize = 50;
            const columns = Math.ceil(width / gridSize);
            const rows = Math.ceil(height / gridSize);
            
            // 生成网格项
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < columns; j++) {
                    const gridItem = document.createElement('div');
                    gridItem.classList.add('grid-item');
                    gridContainer.appendChild(gridItem);
                }
            }
        }
        
        // 初始化
        function init() {
            setupTransitionAnimation();
            generateGrid();
        }
        
        // 初始化
        init();
        
        // 窗口大小改变时重新生成网格
        window.addEventListener('resize', generateGrid);
    </script>

</body>
</html>
